# Configuración de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/farmacia
spring.datasource.username=postgres
spring.datasource.password=wirt050706
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Servidor
server.port=8080
spring.application.name=farmacia

# JWT (clave secreta y tiempo de expiración)
jwt.secret=miClaveSecretaSuperSeguraQueDebeSerLarga1234567890
jwt.expiration=86400000

# Mostrar SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Nivel de logs de la aplicación
logging.level.com.farmacia=DEBUG
logging.level.root=INFO